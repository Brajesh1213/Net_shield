directories:
  output: ../dist
  buildResources: build
appId: com.asthak.app
productName: Asthak
copyright: Copyright © 2026 Asthak Team
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: icon.ico
  requestedExecutionLevel: requireAdministrator
  sign: null
  signingHashAlgorithms: null
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Asthak
extraResources:
  - from: ../build/Asthak.exe
    to: Asthak.exe
files:
  - filter:
      - '**/*'
      - '!node_modules/.cache'
      - '!**/*.map'
electronVersion: 28.3.3
